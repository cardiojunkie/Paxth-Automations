name: moosstudio

services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: moosstudioza:latest
    container_name: moosstudio-app
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 3000
      MAX_CONCURRENT_BROWSER_TASKS: 1
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data/harvest:/app/harvest
      - ./data/jobs:/app/jobs
      - ./data/outputs:/app/outputs
      - ./data/images:/app/public/images
      - ./data/sku-index:/app/sku-index
      - ./data/settings:/app/settings
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

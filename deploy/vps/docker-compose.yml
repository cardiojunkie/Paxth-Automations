name: moosstudio

services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: moosstudioza:latest
    container_name: moosstudio-app
    restart: unless-stopped
    env_file:
      - /opt/moosstudio/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      MAX_CONCURRENT_BROWSER_TASKS: 1
    ports:
      - "3000:3000"
    volumes:
      - /opt/moosstudio/harvest:/app/harvest
      - /opt/moosstudio/jobs:/app/jobs
      - /opt/moosstudio/outputs:/app/outputs
      - /opt/moosstudio/images:/app/public/images
      - /opt/moosstudio/sku-index:/app/sku-index
      - /opt/moosstudio/settings:/app/settings
      - /opt/moosstudio/firebase-applet-config.json:/app/firebase-applet-config.json
      - /opt/moosstudio/firebase-service-account.json:/app/firebase-service-account.json
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

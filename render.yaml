services:
  - type: web
    name: moosstudioza
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: FIRESTORE_MODE
        value: all
      - key: GROQ_API_KEY
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: AUTH_LOGIN_CODE
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: COOKIE_SAME_SITE
        value: strict
      - key: COOKIE_SECURE
        value: "true"
      - key: TRUST_PROXY
        value: "true"
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
